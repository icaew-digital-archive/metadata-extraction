extra_validation_rules:
  - "entity.title must be an exact copy of the Title field"
  - "entity.description must be an exact copy of the Description field"
  - "Content type must be one of the controlled vocabulary terms (exact spelling and case)"
  - "Identifiers must only include ISBNs, URLs, or clear ICAEW reference codes"
  - "All text must use British English spelling throughout all metadata fields. Convert any American English spellings to British English equivalents"
  - >
    Subject field validation: maximum of 10 subjects allowed; subject names must exactly
    match those in the hierarchical topic list (case-sensitive); for nested topics, all
    parent topics must be included in the Subject array along with the specific topic
